      Verified live and public: the GT Digital Repository OAI-PMH interface
      (Identify returns "Georgia Tech Digital Repository", HTTP 200) and the
      DSpace 7 REST API root (HTTP 200). The RNOC GT Places API is documented
      as openly accessible (docs page HTTP 200) but no public base URL or
      endpoint details are published. BuzzAPI exists at api.gatech.edu but is
      credentialed: the apiv3 root returns 404 unauthenticated and the
      developers handbook redirects to CAS SSO. The SUMS REST help page loads
      (HTTP 200) but exposes no public operation docs. The official GitHub org
      github.com/gatech exists with minimal public repos. No fabricated
      endpoints; gated and undocumented surfaces flagged honestly.
